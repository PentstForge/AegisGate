version: "3.8"
services:
  demoweb:
    image: nginx:alpine
    container_name: aegisgate-demo
    ports:
      - "8090:8090"
    volumes:
      - ./DemoWeb:/usr/share/nginx/demoweb:ro
      - ./DemoWeb/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  aegisdocs:
    image: nginx:alpine
    container_name: aegisgate-docs
    ports:
      - "8091:8091"
    volumes:
      - ./AegisDocs:/usr/share/nginx/aegisdocs:ro
      - ./AegisDocs/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped